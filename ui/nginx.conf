server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy to Azure Functions. The browser demo auth is not a security
    # boundary, so every proxied API request must pass nginx-level auth before
    # nginx forwards the request with the internal Functions key.
    location /api/ {
        auth_basic "Orchestration API";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://orchestration-functions:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header x-functions-key ${ORCHESTRATION_FUNCTION_KEY};
        proxy_cache_bypass $http_upgrade;
    }
}
