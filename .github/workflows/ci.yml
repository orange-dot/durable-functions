name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "20"
  SOLUTION_PATH: "src/Orchestration.sln"

jobs:
  dotnet:
    name: .NET Build and Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout OrangeDot Supabase SDK
        uses: actions/checkout@v4
        with:
          repository: orange-dot/orange-dot-supabase-sdk
          path: orange-dot-supabase-sdk
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Run .NET unit test suite
        run: |
          dotnet test src/Orchestration.Tests/Orchestration.Tests.csproj \
            --configuration Release \
            --no-restore \
            --verbosity minimal \
            --filter "Category!=Integration" \
            -m:1 \
            -p:UseSharedCompilation=false \
            -nr:false

  supabase-integration:
    name: Supabase Integration Tests
    runs-on: ubuntu-latest
    needs: dotnet
    env:
      ORCHESTRATION_RUN_SUPABASE_TESTS: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout OrangeDot Supabase SDK
        uses: actions/checkout@v4
        with:
          repository: orange-dot/orange-dot-supabase-sdk
          path: orange-dot-supabase-sdk
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Start local Supabase stack
        working-directory: orange-dot-supabase-sdk
        run: supabase start

      - name: Supabase status
        working-directory: orange-dot-supabase-sdk
        run: supabase status

      - name: Run Supabase integration tests
        run: |
          dotnet test src/Orchestration.Tests/Orchestration.Tests.csproj \
            --configuration Release \
            --no-restore \
            --verbosity minimal \
            --filter "FullyQualifiedName~Orchestration.Tests.Integration.Supabase" \
            -m:1 \
            -p:UseSharedCompilation=false \
            -nr:false

      - name: Docker containers
        if: failure()
        run: docker ps -a

  ui:
    name: UI Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build UI
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [dotnet, ui]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Functions Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.functions
          push: false
          tags: orchestration-functions:test

      - name: Build UI Docker image
        uses: docker/build-push-action@v6
        with:
          context: ui
          file: ui/Dockerfile
          push: false
          tags: orchestration-ui:test
