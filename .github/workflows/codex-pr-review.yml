# Codex PR Code Review
# Automatically reviews pull requests using OpenAI Codex
#
# Prerequisites:
# 1. Add OPENAI_API_KEY to repository secrets (Settings → Secrets → Actions)
# 2. Ensure the OpenAI API key has access to Codex models
#
# This workflow:
# - Triggers on PR creation and updates
# - Reviews code changes for correctness, security, performance
# - Posts review comments directly on the PR

name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Limit concurrent reviews per PR
concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Only run if the secret exists
    if: ${{ vars.ENABLE_CODEX_REVIEW != 'false' }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          # Use the merge commit so Codex sees final merged state
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0  # Full history for better context

      - name: Get changed files
        id: changed-files
        run: |
          # Get list of changed files in this PR
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt
          echo "files=$(cat changed_files.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Run Codex Review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/pr-review.md
          # Fallback inline prompt if file doesn't exist
          prompt: |
            You are an expert code reviewer for an Azure Durable Functions orchestration system.

            ## Repository Context
            This is a .NET 9 solution with:
            - Orchestration.Core: Workflow definitions, state machine interpreter
            - Orchestration.Infrastructure: Azure Storage, Cosmos DB integrations
            - Orchestration.Functions: Azure Durable Functions (HTTP triggers, orchestrators, activities)
            - UI: React + TypeScript frontend with TanStack Router/Query

            ## Your Task
            Review PR #${{ github.event.pull_request.number }} titled: "${{ github.event.pull_request.title }}"

            Changed files: ${{ steps.changed-files.outputs.files }}

            ## Review Focus Areas
            1. **Correctness**: Logic errors, edge cases, null handling
            2. **Security**: Input validation, injection risks, secrets exposure
            3. **Performance**: N+1 queries, unnecessary allocations, async/await issues
            4. **Azure Durable Functions**: Orchestrator determinism, replay-safe code
            5. **Code Quality**: Naming, SOLID principles, error handling

            ## Output Format
            Provide a concise markdown review with:
            - 🟢 **Strengths**: What's done well (1-2 points)
            - 🟡 **Suggestions**: Non-blocking improvements (if any)
            - 🔴 **Issues**: Must-fix problems (if any)
            - 📝 **Summary**: One sentence overall assessment

            Be specific with file names and line references when possible.
            If the changes look good, say so briefly - don't manufacture issues.

      - name: Post Review Comment
        if: steps.codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.codex.outputs.final-message }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const review = process.env.REVIEW;

            // Check if we already posted a Codex review on this PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const codexComments = comments.data.filter(c =>
              c.body.includes('<!-- codex-review -->') &&
              c.user.login === 'github-actions[bot]'
            );

            const body = `<!-- codex-review -->
            ## 🤖 Codex Code Review

            ${review}

            ---
            <sub>Automated review by [OpenAI Codex](https://openai.com/codex) • Commit: ${{ github.event.pull_request.head.sha.substring(0, 7) }}</sub>
            `;

            if (codexComments.length > 0) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: codexComments[0].id,
                body: body,
              });
              console.log('Updated existing Codex review comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
              console.log('Created new Codex review comment');
            }

      - name: Review Summary
        if: always()
        run: |
          echo "## Codex Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.codex.outputs.final-message }}" ]; then
            echo "✅ Review completed and posted to PR" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No review output generated" >> $GITHUB_STEP_SUMMARY
          fi
